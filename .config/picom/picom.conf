backend = "glx"

dithered-present = false;
vsync = true;

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

use-damage = true;
# corners
corner-radius = 2;
detect-rounded-corners = true;

# Blur settings
blur-method = "dual_kawase";
blur-size = 8;
blur-strength = 6;
blur-kern = "3x3box";

# Fading defaults (non-rule-based tunables)
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 10;
no-fading-openclose = true;
no-fading-destroyed-argb = true;

#################################
#            Rules              #
#################################
#################################
#            Rules              #
#################################
rules: (
  # Base: no blur, no fade for everything unless overridden
  {
    blur-background = false;
    fade = false;
    #shadow = false;  # Removed shadow property from base rule
    corner-radius = 2;
  },
  # Normal windows: fade + shadow + blur
  {
    match = "window_type = 'normal'";
    fade = true;
    #shadow = false;  # Removed shadow property for normal windows
    blur-background = false;
  },
  # Dialogs
  {
    match = "window_type = 'dialog'";
    #shadow = false;  # Removed shadow property for dialogs
    blur-background = false;
  },
  # Tooltips
  {
    match = "window_type = 'tooltip'";
    fade = true;
    #shadow = false;  # Removed shadow property for tooltips
    opacity = 1.0;
    corner-radius = 0;
  },
  # Docks (e.g. Polybar)
  {
    match = "window_type = 'dock'";
    #shadow = false;  # Removed shadow property for docks
    fade = true;
    corner-radius = 0;
  },
  # Menus / popups
  {
    match = "window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'popup' || window_type = 'popup_menu'";
    opacity = 1.0;
    corner-radius = 0;
    #shadow = false;  # Removed shadow property for menus/popup
  },
  # Fullscreen: no rounded corners
  {
    match = "fullscreen";
    corner-radius = 0;
  },
  # Terminals: full opacity, no blur
  {
    match = "class_g = 'Alacritty' || class_g = 'st-256color' || class_g = 'kitty' || class_g = 'FloaTerm'";
    opacity = 1.0;
    #shadow = false;  # Removed shadow property for terminals
    blur-background = false;
  },
  # Scratch / updating windows
  {
    match = "class_g = 'bspwm-scratch' || class_g = 'Updating'";
    opacity = 0.93;
    #shadow = false;  # Removed shadow property for scratch/windows
    blur-background = false;
  },
  # Apps that should never have shadows
  {
    match = "name = 'Notification' || class_g ?= 'Notify-osd' || class_g = 'Dunst' || "
            "class_g = 'Polybar' || class_g = 'Eww' || class_g = 'jgmenu' || "
            "class_g = 'bspwm-scratch' || class_g = 'Spotify' || class_g = 'retroarch' || "
            "class_g = 'firefox' || class_g = 'Rofi' || class_g = 'Screenkey' || "
            "class_g = 'mpv' || class_g = 'Viewnior'";
    shadow = false;  # Removed shadow property for apps
  },
  # GTK frame extents / slop: no blur
  {
    match = "class_g = 'slop' || _GTK_FRAME_EXTENTS@";
    #shadow = false;  # Removed shadow property for GTK frame extents
    blur-background = false;
  },
  # Small UI elements with shadow bugs
  {
    match = "window_type = 'menu' || role = 'popup' || role = 'bubble'";
    #shadow = false;  # Removed shadow property for small UI elements
  },
);
#################################
#          Animations           #
#################################
animations = (
  {
    triggers = ["close", "hide"];
    opacity = {
      curve = "linear";
      duration = 0.1;
      start = "window-raw-opacity-before";
      end = 0;
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
  },
  {
    triggers = ["open", "show"];
    opacity = {
      curve = "cubic-bezier(0,1,1,1)";
      duration = 0.3;
      start = 0;
      end = "window-raw-opacity";
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    scale-x = {
      curve = "cubic-bezier(0,1.3,1,1)";
      duration = 0.3;
      start = 0.6;
      end = 1;
    };
    scale-y = "scale-x";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
  {
    triggers = ["geometry"];
    scale-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.22;
      start = "window-width-before / window-width";
      end = 1;
    };
    scale-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.22;
      start = "window-height-before / window-height";
      end = 1;
    };
    offset-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.22;
      start = "window-x-before - window-x";
      end = 0;
    };
    offset-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.22;
      start = "window-y-before - window-y";
      end = 0;
    };
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  }
);
