; ===== MAIN BAR SETTINGS =====
[bar/main]
width = 100%
height = 42
radius = 0
line-size = 2
line-color = #cba6f7
override-redirect = false
background = #0c0b14
foreground = #d2d1d3
font-0 = "JetBrainsMono Nerd Font:size=12:weight=Bold;2"
font-1 = "DejaVu Sans Mono wifi ramp:size=14;1"
font-2 = "Noto Sans:size=14;1"
font-3 = "JetBrainsMonoNF:size=14;3"
font-4 = "JetBrainsMonoNF:size=13;3"
modules-left   = workspaces xwindow
modules-center = clock 
modules-right  = tray  battery  backlight alsa   network bluetooth
separator = ""
padding-left = 1
padding-right = 3
module-margin = 2
wm-restack = bspwm

; ===== CUSTOM MODULES =====
[module/cpu-governor]
type = custom/script
exec = ~/.config/polybar/profile.sh
interval = 2
click-left = ~/.config/polybar/profile.sh toggle
label = %output%
label-font = 5

[module/logo]
type = custom/text
format = "’ī¤"
format-foreground = #d2d1d3
label-font = 5

; ===== WORKSPACE MODULE =====
[module/workspaces]
type = internal/bspwm
format = <label-state>
index-sort = true
pin-workspaces = true
label-focused = %index%
label-focused-foreground = #bfc9f4
label-focused-underline = #bfc9f4
label-focused-padding = 1
label-occupied = %index%
label-occupied-foreground = #6c7086
label-occupied-padding = 1
label-empty = %index%
label-empty-foreground = #414456
label-empty-padding = 1
label-urgent = %index%
label-urgent-foreground = #f38ba8
label-urgent-underline = #f38ba8
label-urgent-padding = 1

; ===== SYSTEM MODULES =====
[module/xwindow]
type = internal/xwindow
label = %title:0:30...%
label-foreground = #d2d1d3

[module/memory]
type = internal/memory
interval = 2
label = Ņ┐ģ  %gb_used%
label-foreground = #d2d1d3

[module/cpu]
type = internal/cpu
interval = 2
label = ’Æ╝  %percentage%%
label-foreground = #d2d1d3

[module/temperature]
type = internal/temperature
interval = 2
hwmon-path = /sys/class/hwmon/hwmon8/temp1_input
warn-temperature = 75
format = <ramp> <label>
format-warn = <label-warn>
label = %temperature-c%
label-warn = ’ŗć %temperature-c%
label-warn-foreground = #f38ba8
ramp-0 = ’ŗŗ
ramp-1 = ’ŗŖ
ramp-2 = ’ŗē
ramp-3 = ’ŗł
ramp-4 = ’ŗć
