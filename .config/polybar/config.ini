[module/clock]
type = internal/date
interval = 1
date = %a %d
time = %H:%M
label = %date% Ņ«Ŗ %time%
label-foreground = #d2d1d3

[module/tray]
type = internal/tray
tray-spacing = 2px
tray-size = 60%
tray-padding = 2px

[module/alsa]
type = internal/alsa
use-ui-max = true
interval = 5
format-volume = <label-volume>
label-volume = ’Ć¦  %percentage%%
label-volume-foreground = #d2d1d3
