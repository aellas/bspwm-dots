; ===== MAIN BAR SETTINGS =====
[bar/main]
width = 100%
height = 54
radius = 0
line-size = 2
line-color = #cba6f7
override-redirect = false
background = #111117
foreground = #cbd0ec
enable-ipc = true
font-0 = "JetBrainsMono Nerd Font:size=16:weight=SemiBold;3"
font-1 = "DejaVu Sans Mono wifi ramp:size=17;0"
font-2 = "Noto Sans:size=12;1"
font-3 = "JetBrainsMonoNF:size=12;3"
font-4 = "JetBrainsMonoNF:size=19;4"


modules-left   = workspaces  xwindow
modules-center = clock 
modules-right  = tray battery  backlight   alsa  network bluetooth 
separator = "  "
padding-left = 1
padding-right = 3
module-margin = 1.0
wm-restack = bspwm

; ===== CUSTOM MODULES =====

[module/spacer]
type = custom/text
label = 
format-foreground = #373b41
label-font = 4

[module/cpu-governor]
type = custom/script
exec = ~/.config/polybar/profile.sh
interval = 2
click-left = ~/.config/polybar/profile.sh toggle
label = %output%
label-font = 5

[module/logo]
type = custom/text
format = "ÔĆü"
format-foreground = #cbd0ec
label-font = 5



[module/workspaces]
type = internal/bspwm

format = <label-state>
index-sort = true
pin-workspaces = true

label-focused = %index%
label-focused-foreground = #bfc9f4
label-focused-underline = #bfc9f4
label-focused-padding = 1 

label-occupied = %index%
label-occupied-foreground = #6c7086
label-occupied-padding = 1

label-empty = %index%
label-empty-foreground = #414456
label-empty-padding = 1

label-urgent = %index%
label-urgent-foreground = #f38ba8
label-urgent-underline = #f38ba8
label-urgent-padding = 1

;==== SYSTEM MODULES =====
[module/xwindow]
type = internal/xwindow
label = %title:0:30...%
label-foreground = #cbd0ec

[module/memory]
type = internal/memory
interval = 2
label = ÓŅÖ  %gb_used%
label-foreground = #d2d1d3

[module/cpu]
type = internal/cpu
interval = 2
label = Ôíľ  %percentage%%
label-foreground = #cbd0ec

[module/temperature]
type = internal/temperature
interval = 2
hwmon-path = /sys/class/hwmon/hwmon8/temp1_input
warn-temperature = 75
format = <ramp> <label>
format-warn = <label-warn>
label = %temperature-c%
label-warn = Ôčá %temperature-c%
label-warn-foreground = #f38ba8
ramp-0 = Ôčč
ramp-1 = Ôčä
ramp-2 = ÔčČ
ramp-3 = Ôčą
ramp-4 = Ôčá
ramp-foreground = #d2d1d3

[module/clock]
type = internal/date
interval = 1
date = %a %d
time = %H:%M
label = %date%  %time%
label-foreground = #cbd0ec

[module/tray]
type = internal/tray
tray-spacing = 2px
tray-size = 46%
tray-padding = 2px
tray-foreground = #cbd0ec

[module/alsa]
type = internal/pulseaudio
use-ui-max = true
interval = 5
format-volume = <label-volume>
label-volume = ÔÄ®  %percentage%%
label-volume-foreground = #cbd0ec
label-muted = ůįĚü muted
label-muted-foreground = #cbd0ec
click-right = kitty -e wiremix 
label-font = 5

[module/network]
type = internal/network
interface = wlan0
interval = 1.0
accumulate-stats = true
unknown-as-up = true
label-connected = inix
label-disconnected = ÓÉö
format-connected = <ramp-signal> 
format-disconnected = <label-disconnected>
ramp-signal-0 = ÓÉē 
ramp-signal-1 = ÓÉē 
ramp-signal-2 = ůį§ü 
ramp-signal-3 = ůį§Ę 
ramp-signal-4 = ÓÉė
ramp-signal-5 = ÓÉô
click-right = kitty -e nmtui 

[module/backlight]
type = internal/backlight
label = ůįÉ†  %percentage%%
card = intel_backlight
use-actual-brightness = true
poll-interval = 0
enable-scroll = true
scroll-interval = 2

[module/battery]
type = internal/battery
full-at = 99
battery = BAT0
adapter = ADP1
poll-interval = 1
time-format = %H:%M
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> 100% 
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = " Full"
ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀļ
ramp-capacity-2 = ůįĀĽ
ramp-capacity-3 = ůįĀľ
ramp-capacity-4 = ůįĀĹ
ramp-capacity-5 = ůįĀĺ
ramp-capacity-6 = ůįĀŅ
ramp-capacity-7 = ůįāÄ
ramp-capacity-8 = ůįāĀ
ramp-capacity-9 = ůįāā
ramp-capacity-10 = ůįĀĻ
animation-charging-0 = ůįĘü
animation-charging-1 = ůįĘú
animation-charging-2 = ůįāÜ
animation-charging-3 = ůįāá
animation-charging-4 = ůįāą
animation-charging-5 = ůįĘĚ
animation-charging-6 = ůįāČ
animation-charging-7 = ůįĘě
animation-charging-8 = ůįāä
animation-charging-9 = ůįāč
animation-charging-10 = ůįāÖ
animation-charging-framerate = 750

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/bluetooth.sh
interval = 5
click-left = kitty -e bluetuith 
label = %output%
label-font = 5 

[module/bsp-layout]
type = custom/script
exec = ~/.config/polybar/layouts.sh
interval = 1
click-left = ~/.config/polybar/layouts.sh next
click-right = ~/.config/polybar/layouts.sh prev
label = %output%
